name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  stylua:
    name: stylua check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ test/

  smoke:
    name: smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Set up Python (for OSC packet builder used by tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke tests
        run: bash test/smoke_test.sh
