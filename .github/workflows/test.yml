name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  stylua:
    name: stylua check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ test/

  smoke:
    name: smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Set up Python (for OSC packet builder used by tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Compile the SuperCollider tree-sitter parser so the parser tests in
      # the smoke suite actually run (without this they skip gracefully).
      - name: Build tree-sitter-supercollider parser
        run: |
          git clone --depth=1 https://github.com/madskjeldgaard/tree-sitter-supercollider /tmp/ts-sc
          cc -o /tmp/ts-sc/supercollider.so -shared -fPIC -I /tmp/ts-sc/src \
            /tmp/ts-sc/src/parser.c /tmp/ts-sc/src/scanner.c
          test -f /tmp/ts-sc/supercollider.so

      - name: Run smoke tests
        env:
          SC_TS_PARSER_PATH: /tmp/ts-sc/supercollider.so
        run: bash test/smoke_test.sh
